<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>★ 云舟星际战舰 ★</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;font-family:"Microsoft YaHei",sans-serif;}
#container{position:relative;width:100vw;height:100vh;}
#gameCanvas{background:#000;display:block;width:100%;height:100%;}
#uiOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;pointer-events:auto;}
.screen.hidden{display:none;}
.screen h1{font-size:clamp(1.8em,6vw,2.5em);margin-bottom:16px;color:#50d0ff;text-shadow:0 0 12px #50d0ff;}
.screen p{font-size:clamp(0.9em,2.8vw,1.1em);margin:6px 0;text-align:center;padding:0 20px;color:#ccc;}
.btn{background:#2563eb;color:#fff;border:none;padding:12px 36px;font-size:clamp(1em,3vw,1.2em);border-radius:8px;margin-top:22px;cursor:pointer;transition:all 0.2s;}
.btn:hover,.btn:active{background:#1d4ed8;box-shadow:0 0 18px #2563eb;}
#touchControls{position:absolute;bottom:20px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;}
.touchBtn{width:80px;height:80px;background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.45);border-radius:50%;pointer-events:auto;touch-action:none;display:flex;justify-content:center;align-items:center;color:#fff;font-size:13px;user-select:none;}
.touchBtn.fire{background:rgba(255,50,50,0.28);border-color:rgba(255,80,80,0.65);}
@media(min-width:520px){#touchControls{display:none;}}
</style>
</head>
<body>
<div id="container">
  <canvas id="gameCanvas"></canvas>
  <div id="uiOverlay">
    <div id="startScreen" class="screen">
      <h1>★ 云舟星际战舰 ★</h1>
      <p>击落敌机，躲避子弹，挑战关卡Boss！</p>
      <p>键盘：WASD/方向键移动，空格/J射击</p>
      <p>手机：左侧摇杆移动，右侧开火</p>
      <button class="btn" id="startBtn">开始游戏</button>
      <p style="margin-top:16px;font-size:0.85em;color:#888;">共5关，每关最后有Boss</p>
    </div>
    <div id="gameOverScreen" class="screen hidden">
      <h1 id="gameOverTitle">游戏结束</h1>
      <p>最终得分：<span id="finalScore">0</span></p>
      <p>通关关卡：<span id="finalLevel">0</span> / 5</p>
      <button class="btn" id="restartBtn">再来一局</button>
    </div>
  </div>
  <div id="touchControls">
    <div class="touchBtn" id="joyBtn">移动</div>
    <div class="touchBtn fire" id="fireBtn">开火</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  全局变量
// ═══════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width;
  H = canvas.height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 颜色
const RED    = [255,50,50];
const GREEN  = [50,255,100];
const BLUE   = [50,150,255];
const YELLOW = [255,220,50];
const CYAN   = [50,240,240];
const ORANGE = [255,140,30];
const PURPLE = [180,60,255];
const GRAY   = [120,120,120];
const WHITE  = [255,255,255];
const PINK   = [255,100,180];
const GOLD   = [255,200,0];
const LIME   = [150,255,0];

// 游戏状态
let gameState = 'start';
let player    = null;
let enemies   = [];
let particles = [];
let stars     = [];
let bulletsPlayer = [];
let bulletsEnemy  = [];
let level         = 1;
const totalLevels = 5;
let spawnTimer    = 0;
let killCount     = 0;       // 每关击杀计数
let bossSpawned   = false;
let boss          = null;
let animId        = null;
let lastTime      = 0;
const FRAME_MS    = 1000 / 60;

// 键盘
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// 触摸
let touchLeft=false, touchRight=false, touchUp=false, touchDown=false, touchFire=false;

// ═══════════════════════════════════════════
//  音频（Web Audio API 合成）
// ═══════════════════════════════════════════
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playShoot() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}
function playBoom(big=false) {
  if (!audioCtx) return;
  const dur = big ? 0.6 : 0.3;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(big?120:180, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(big?0.5:0.35, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playHit() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}
function playPowerup() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.25);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  o.start(); o.stop(audioCtx.currentTime + 0.25);
}

// ═══════════════════════════════════════════
//  辅助绘图
// ═══════════════════════════════════════════
function rgb(c)  { return `rgb(${c[0]},${c[1]},${c[2]})`; }
function rgba(c,a){ return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

function drawPoly(pts, fill, stroke, lw=1) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  if (fill)  { ctx.fillStyle   = rgb(fill);   ctx.fill(); }
  if (stroke){ ctx.strokeStyle = rgb(stroke);  ctx.lineWidth=lw; ctx.stroke(); }
}

function drawLine(x1,y1,x2,y2,col,lw=1) {
  ctx.strokeStyle=rgb(col); ctx.lineWidth=lw;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}

function drawBar(x,y,w,h,ratio,fg) {
  ctx.fillStyle=rgb(GRAY); ctx.fillRect(x,y,w,h);
  ctx.fillStyle=rgb(fg);   ctx.fillRect(x,y,Math.max(0,w*ratio),h);
  ctx.strokeStyle=rgb(WHITE); ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
}

function rectHit(a,b) {
  return !(a.x+a.w<b.x || a.x>b.x+b.w || a.y+a.h<b.y || a.y>b.y+b.h);
}

// ═══════════════════════════════════════════
//  星空
// ═══════════════════════════════════════════
function initStars() {
  stars = Array.from({length:120}, () => [
    Math.random()*W, Math.random()*H,
    Math.random()<0.5?1:2,
    Math.floor(50+Math.random()*180)
  ]);
}
function drawStars() {
  for (let s of stars) {
    ctx.fillStyle=`rgb(${s[3]},${s[3]},${s[3]})`;
    ctx.beginPath(); ctx.arc(s[0],s[1],s[2],0,Math.PI*2); ctx.fill();
    s[1] += s[2]*0.3;
    if (s[1]>H) { s[0]=Math.random()*W; s[1]=-4; }
  }
}

// ═══════════════════════════════════════════
//  粒子
// ═══════════════════════════════════════════
class Particle {
  constructor(x,y,color,speed=3,life=30,size=3) {
    this.x=x; this.y=y; this.color=color;
    this.life=life; this.maxLife=life; this.size=size;
    const a=Math.random()*Math.PI*2, sp=speed*(0.4+Math.random()*0.6);
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.06; this.life--; }
  draw(){
    const al=this.life/this.maxLife;
    ctx.fillStyle=rgba(this.color,al);
    ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(1,this.size*al),0,Math.PI*2); ctx.fill();
  }
  get alive(){ return this.life>0; }
}
function boom(x,y,col,n=20,spd=4,sz=4){
  for(let i=0;i<n;i++) particles.push(new Particle(x,y,col,spd,20+Math.random()*20|0,sz));
}

// ═══════════════════════════════════════════
//  子弹
// ═══════════════════════════════════════════
class Bullet {
  constructor(x,y,vy,color,damage,size,vx=0){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.color=color; this.damage=damage; this.size=size; this.alive=true;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.y<-20||this.y>H+20||this.x<-20||this.x>W+20) this.alive=false;
  }
  draw(){
    ctx.fillStyle=rgb(this.color);
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=rgba(this.color,0.35);
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*2,0,Math.PI*2); ctx.fill();
  }
  getRect(){ return {x:this.x-this.size,y:this.y-this.size,w:this.size*2,h:this.size*2}; }
}

// ═══════════════════════════════════════════
//  玩家
// ═══════════════════════════════════════════
class Player {
  constructor(){
    this.x=W/2; this.y=H-90;
    this.hp=100; this.maxHp=100;
    this.speed=5; this.shootCd=0; this.shootDelay=8;
    this.invincible=0; this.power=1;
    this.score=0; this.lives=3;
    this.t=0; this.firing=false;
  }
  handleInput(){
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']||touchLeft)  dx-=1;
    if(keys['ArrowRight']||keys['d']||touchRight) dx+=1;
    if(keys['ArrowUp']||keys['w']||touchUp)      dy-=1;
    if(keys['ArrowDown']||keys['s']||touchDown)  dy+=1;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len>0){ this.x+=dx/len*this.speed; this.y+=dy/len*this.speed; }
    this.x=Math.max(22,Math.min(W-22,this.x));
    this.y=Math.max(28,Math.min(H-28,this.y));
    if(keys[' ']||keys['j']||touchFire||this.firing) this.tryShoot();
  }
  tryShoot(){
    if(this.shootCd>0) return;
    if(this.power===1){
      bulletsPlayer.push(new Bullet(this.x,this.y-22,-14,YELLOW,10,4));
    } else if(this.power===2){
      bulletsPlayer.push(new Bullet(this.x-13,this.y-16,-14,CYAN,12,4));
      bulletsPlayer.push(new Bullet(this.x+13,this.y-16,-14,CYAN,12,4));
    } else {
      bulletsPlayer.push(new Bullet(this.x,   this.y-22,-15,WHITE,15,5));
      bulletsPlayer.push(new Bullet(this.x-16,this.y-14,-14,CYAN,12,4,-0.5));
      bulletsPlayer.push(new Bullet(this.x+16,this.y-14,-14,CYAN,12,4,0.5));
    }
    this.shootCd=this.shootDelay;
    playShoot();
  }
  update(){
    if(this.shootCd>0) this.shootCd--;
    if(this.invincible>0) this.invincible--;
    this.t++;
    bulletsPlayer.forEach(b=>b.update());
    bulletsPlayer=bulletsPlayer.filter(b=>b.alive);
  }
  takeDamage(dmg){
    if(this.invincible>0) return false;
    this.hp-=dmg; this.invincible=90; playHit(); return true;
  }
  getRect(){ return {x:this.x-16,y:this.y-20,w:32,h:40}; }
  draw(){
    const cx=this.x|0, cy=this.y|0, t=this.t;
    // 双发尾焰
    for(let ex of [cx-10,cx+10]){
      const fh=18+Math.sin(t*0.6+ex)*5|0;
      [[RED,6],[ORANGE,4],[YELLOW,3],[WHITE,2]].forEach(([fc,fw],i)=>{
        ctx.save(); ctx.globalAlpha=(200-i*35)/255;
        ctx.fillStyle=rgb(fc);
        ctx.beginPath(); ctx.ellipse(ex,cy+20+fh/2,fw,fh/2,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
    // 尾翼
    drawPoly([[cx-6,cy+18],[cx-15,cy+28],[cx-6,cy+28]],[20,60,160],[80,180,255]);
    drawPoly([[cx+6,cy+18],[cx+15,cy+28],[cx+6,cy+28]],[20,60,160],[80,180,255]);
    // 主翼
    drawPoly([[cx-10,cy+2],[cx-40,cy+22],[cx-30,cy+30],[cx-8,cy+18]],[15,55,150],[60,160,255]);
    drawPoly([[cx+10,cy+2],[cx+40,cy+22],[cx+30,cy+30],[cx+8,cy+18]],[15,55,150],[60,160,255]);
    // 机身
    drawPoly([[cx,cy-30],[cx-5,cy-18],[cx-8,cy-4],[cx-9,cy+10],[cx-8,cy+22],
              [cx,cy+16],[cx+8,cy+22],[cx+9,cy+10],[cx+8,cy-4],[cx+5,cy-18]],[18,80,180],[100,200,255]);
    // 中轴高光
    drawLine(cx,cy-28,cx,cy+14,[150,220,255]);
    // 驾驶舱
    drawPoly([[cx,cy-28],[cx-6,cy-17],[cx-5,cy-7],[cx+5,cy-7],[cx+6,cy-17]],[30,120,200],CYAN);
    drawLine(cx-1,cy-26,cx-3,cy-11,[180,240,255]);
    // 进气口
    for(let sx of [cx-9,cx+4]){
      ctx.fillStyle='rgb(10,30,100)'; ctx.fillRect(sx,cy-2,7,10);
      ctx.strokeStyle='rgb(80,160,255)'; ctx.lineWidth=1; ctx.strokeRect(sx,cy-2,7,10);
    }
    // 挂弹
    for(let [mx,my] of [[cx-28,cy+14],[cx+24,cy+14]]){
      ctx.fillStyle='rgb(60,60,80)'; ctx.beginPath(); ctx.ellipse(mx,my,3,7,0,0,Math.PI*2); ctx.fill();
      drawLine(mx,my+7,mx,my+12,ORANGE,2);
    }
    // 武器光效
    if(this.power>=2){
      ctx.save(); ctx.globalAlpha=0.22+0.12*Math.sin(t*0.2);
      ctx.fillStyle='rgba(0,200,255,0.5)';
      for(let gx of [cx-14,cx+10]){ ctx.beginPath(); ctx.arc(gx+5,cy,10,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    // 护盾
    if(this.invincible>0&&(this.invincible/5|0)%2===0){
      ctx.save(); ctx.globalAlpha=0.3*this.invincible/90;
      ctx.strokeStyle='rgba(100,200,255,0.8)'; ctx.lineWidth=2;
      for(let r=0;r<3;r++){
        ctx.beginPath(); ctx.ellipse(cx,cy,38-r*2,44-r*2,0,0,Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════
//  敌机基类
// ═══════════════════════════════════════════
class Enemy {
  constructor(x,y,hp,speed,scoreValue,color){
    this.x=x; this.y=y; this.hp=hp; this.maxHp=hp;
    this.speed=speed; this.scoreValue=scoreValue; this.color=color;
    this.alive=true; this.bullets=[]; this.t=0; this.shootCd=30;
  }
  updateBullets(){
    this.bullets.forEach(b=>b.update());
    this.bullets=this.bullets.filter(b=>b.alive);
  }
  drawHpBar(){
    if(this.hp>=this.maxHp) return;
    drawBar(this.x-20,this.y-30,40,4,this.hp/this.maxHp,RED);
  }
  drawBullets(){ this.bullets.forEach(b=>b.draw()); }
}

// ── 类型1：战斗机（红色，直冲）──────────────
class EnemyFighter extends Enemy {
  constructor(x,y,level=1){
    super(x,y,10+level*5,2.5+level*0.3,100+level*20,RED);
    this.size=14; this.shootInterval=Math.max(60,120-level*8);
    this.shootCd=Math.random()*this.shootInterval|0;
  }
  getRect(){ return {x:this.x-this.size,y:this.y-this.size,w:this.size*2,h:this.size*2}; }
  update(){
    this.t++; this.y+=this.speed; this.shootCd--;
    if(this.shootCd<=0){ this.bullets.push(new Bullet(this.x,this.y+18,6,RED,12,4)); this.shootCd=this.shootInterval; }
    this.updateBullets();
    if(this.y>H+50) this.alive=false;
  }
  draw(){
    const cx=this.x|0,cy=this.y|0,s=this.size;
    // 尾焰
    ctx.save(); ctx.globalAlpha=0.7; ctx.fillStyle='rgb(255,140,30)';
    ctx.beginPath(); ctx.ellipse(cx,cy+s+5,4,8,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    // 机身（战斗机形状）
    drawPoly([[cx,cy-s],[cx-s*0.6,cy+s*0.5],[cx,cy+s*0.2],[cx+s*0.6,cy+s*0.5]],[160,10,10],RED);
    // 双翼
    drawPoly([[cx-s*0.5,cy],[cx-s*1.4,cy+s*0.8],[cx-s*0.8,cy+s]],[120,5,5],[200,60,60]);
    drawPoly([[cx+s*0.5,cy],[cx+s*1.4,cy+s*0.8],[cx+s*0.8,cy+s]],[120,5,5],[200,60,60]);
    // 驾驶舱
    ctx.fillStyle='rgba(255,80,80,0.8)'; ctx.beginPath(); ctx.arc(cx,cy-s*0.3,4,0,Math.PI*2); ctx.fill();
    this.drawHpBar(); this.drawBullets();
  }
}

// ── 类型2：蛇形机（蓝色，左右摇摆）──────────
class EnemyZigzag extends Enemy {
  constructor(x,y,level=1){
    super(x,y,25+level*8,1.8+level*0.2,130+level*25,[50,150,255]);
    this.size=16; this.originX=x; this.amp=70+level*8; this.freq=0.035;
    this.shootInterval=Math.max(55,110-level*8);
    this.shootCd=Math.random()*this.shootInterval|0;
  }
  getRect(){ return {x:this.x-this.size,y:this.y-this.size,w:this.size*2,h:this.size*2}; }
  update(){
    this.t++; this.y+=this.speed;
    this.x=this.originX+Math.sin(this.t*this.freq)*this.amp;
    this.x=Math.max(20,Math.min(W-20,this.x));
    this.shootCd--;
    if(this.shootCd<=0){
      this.bullets.push(new Bullet(this.x-8,this.y+20,5.5,CYAN,10,4));
      this.bullets.push(new Bullet(this.x+8,this.y+20,5.5,CYAN,10,4));
      this.shootCd=this.shootInterval;
    }
    this.updateBullets();
    if(this.y>H+50) this.alive=false;
  }
  draw(){
    const cx=this.x|0,cy=this.y|0,s=this.size;
    // 尾焰（双）
    for(let ex of [cx-7,cx+7]){
      ctx.save(); ctx.globalAlpha=0.65; ctx.fillStyle='rgb(50,200,255)';
      ctx.beginPath(); ctx.ellipse(ex,cy+s+5,3,7,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    // 菱形机身
    drawPoly([[cx,cy-s],[cx+s,cy],[cx,cy+s],[cx-s,cy]],[0,60,140],CYAN);
    // 前后翼尖
    drawPoly([[cx-s,cy],[cx-s*1.6,cy-s*0.4],[cx-s*1.2,cy+s*0.4]],[0,40,100],[50,180,255]);
    drawPoly([[cx+s,cy],[cx+s*1.6,cy-s*0.4],[cx+s*1.2,cy+s*0.4]],[0,40,100],[50,180,255]);
    ctx.fillStyle='rgb(100,220,255)'; ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
    this.drawHpBar(); this.drawBullets();
  }
}

// ── 类型3：轰炸机（绿色，散射）───────────────
class EnemyBomber extends Enemy {
  constructor(x,y,level=1){
    super(x,y,60+level*20,1.0+level*0.15,200+level*35,GREEN);
    this.SIZE=24; this.shootInterval=Math.max(45,95-level*5);
    this.shootCd=Math.random()*this.shootInterval|0;
  }
  getRect(){ const s=this.SIZE; return {x:this.x-s,y:this.y-s,w:s*2,h:s*2}; }
  update(){
    this.t++; this.y+=this.speed; this.shootCd--;
    if(this.shootCd<=0){
      for(let a of [-20,0,20]){
        const rad=(90+a)*Math.PI/180;
        this.bullets.push(new Bullet(this.x,this.y+28,Math.sin(rad)*5,GREEN,12,5,Math.cos(rad)*5));
      }
      this.shootCd=this.shootInterval;
    }
    this.updateBullets();
    if(this.y>H+60) this.alive=false;
  }
  draw(){
    const cx=this.x|0,cy=this.y|0,s=this.SIZE;
    // 四发尾焰
    for(let ex of [cx-16,cx-6,cx+6,cx+16]){
      const fh=8+Math.sin(this.t*0.4+ex*0.1)*4|0;
      ctx.save(); ctx.globalAlpha=0.6; ctx.fillStyle='rgb(50,255,100)';
      ctx.beginPath(); ctx.ellipse(ex,cy+s+fh/2,4,fh/2,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    // 超宽翼
    drawPoly([[cx-8,cy-4],[cx-s*1.5,cy+2],[cx-s*1.4,cy+14],[cx-10,cy+10]],[0,60,20],GREEN);
    drawPoly([[cx+8,cy-4],[cx+s*1.5,cy+2],[cx+s*1.4,cy+14],[cx+10,cy+10]],[0,60,20],GREEN);
    // 机身
    drawPoly([[cx,cy-s],[cx-10,cy-12],[cx-12,cy-2],[cx-12,cy+14],[cx-6,cy+22],
              [cx+6,cy+22],[cx+12,cy+14],[cx+12,cy-2],[cx+10,cy-12]],[0,70,30],[50,200,80]);
    drawLine(cx,cy-s+2,cx,cy+20,LIME);
    // 驾驶舱
    drawPoly([[cx,cy-s+2],[cx-8,cy-12],[cx+8,cy-12]],[20,120,50],LIME);
    this.drawHpBar(); this.drawBullets();
  }
}

// ── 类型4：快速机（粉色，高速）───────────────
class EnemyFast extends Enemy {
  constructor(x,y,level=1){
    super(x,y,15+level*5,4+level*0.4,160+level*28,PINK);
    this.size=12; this.shootInterval=Math.max(65,100-level*6);
    this.shootCd=Math.random()*this.shootInterval|0;
  }
  getRect(){ return {x:this.x-this.size,y:this.y-this.size,w:this.size*2,h:this.size*2}; }
  update(){
    this.t++; this.y+=this.speed; this.shootCd--;
    if(this.shootCd<=0){ this.bullets.push(new Bullet(this.x,this.y+16,7,PINK,20,5)); this.shootCd=this.shootInterval; }
    this.updateBullets();
    if(this.y>H+50) this.alive=false;
  }
  draw(){
    const cx=this.x|0,cy=this.y|0,s=this.size;
    ctx.save(); ctx.globalAlpha=0.6; ctx.fillStyle='rgb(255,60,160)';
    ctx.beginPath(); ctx.ellipse(cx,cy+s+4,3,6,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    drawPoly([[cx,cy-s],[cx+s,cy],[cx,cy+s],[cx-s,cy]],[200,50,100],PINK);
    // 翼尖
    drawPoly([[cx-s,cy],[cx-s*1.8,cy+s*0.3],[cx-s,cy+s*0.8]],[160,30,80],[220,80,160]);
    drawPoly([[cx+s,cy],[cx+s*1.8,cy+s*0.3],[cx+s,cy+s*0.8]],[160,30,80],[220,80,160]);
    ctx.fillStyle='rgb(255,160,220)'; ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
    this.drawHpBar(); this.drawBullets();
  }
}

// ═══════════════════════════════════════════
//  Boss
// ═══════════════════════════════════════════
class Boss extends Enemy {
  constructor(lv=1){
    const hp=400+lv*200;
    super(W/2,-90,hp,0.8,3000+lv*1000,GOLD);
    this.lv=lv; this.size=80; this.dir=1;
    this.patternTimer=0; this.attackPattern=0; this.entryDone=false;
  }
  getRect(){ return {x:this.x-50,y:this.y-40,w:100,h:100}; }
  update(){
    this.t++; this.patternTimer++;
    if(this.y<90){ this.y+=2; return; }
    if(!this.entryDone){ this.entryDone=true; }
    this.x+=this.dir*1.4;
    if(this.x<90||this.x>W-90) this.dir*=-1;
    if(this.patternTimer>=100){ this.patternTimer=0; this.attackPattern=(this.attackPattern+1)%3; }
    const rage=this.hp<this.maxHp*0.4;
    if(this.attackPattern===0){
      if(this.t%(rage?10:18)===0){
        for(let i=0;i<(rage?16:12);i++){
          const a=(this.t*2+i*(360/(rage?16:12)))*Math.PI/180;
          const sp=rage?5:4;
          this.bullets.push(new Bullet(this.x,this.y+40,Math.sin(a)*sp+2.5,GOLD,20,6,Math.cos(a)*sp));
        }
      }
    } else if(this.attackPattern===1){
      if(this.t%(rage?8:14)===0){
        for(let side of[-1,1]){
          for(let i=0;i<3;i++)
            this.bullets.push(new Bullet(this.x+side*35,this.y+25+i*15,5+i*0.5,ORANGE,18,5));
        }
      }
    } else {
      if(this.t%(rage?6:10)===0){
        const ba=this.t*4;
        for(let i=0;i<(rage?6:4);i++){
          const a=(ba+i*(360/(rage?6:4)))*Math.PI/180;
          this.bullets.push(new Bullet(this.x,this.y+30,(Math.sin(a)*3.5+2.5),PURPLE,25,7,Math.cos(a)*3.5));
        }
      }
    }
    this.updateBullets();
  }
  draw(){
    const cx=this.x|0,cy=this.y|0,t=this.t;
    const rage=this.hp<this.maxHp*0.4;
    // 尾焰
    for(let ex of [cx-24,cx-10,cx+10,cx+24]){
      const fh=16+Math.sin(t*0.5+ex)*6|0;
      [[RED,7],[ORANGE,5],[YELLOW,3],[WHITE,2]].forEach(([fc,fw],i)=>{
        ctx.save(); ctx.globalAlpha=(190-i*30)/255;
        ctx.fillStyle=rgb(fc);
        ctx.beginPath(); ctx.ellipse(ex,cy+46+fh/2,fw,fh/2,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
    // 大翼
    drawPoly([[cx-70,cy+20],[cx-40,cy-22],[cx+40,cy-22],[cx+70,cy+20],[cx+30,cy+44],[cx-30,cy+44]],[80,60,0],GOLD,2);
    // 机身
    drawPoly([[cx-15,cy-35],[cx-22,cy+20],[cx-10,cy+44],[cx+10,cy+44],[cx+22,cy+20],[cx+15,cy-35]],[120,80,20],GOLD,2);
    // 发光核心
    ctx.save();
    ctx.globalAlpha=0.5+0.3*Math.sin(t*0.12);
    ctx.fillStyle=rgba(GOLD,0.6); ctx.beginPath(); ctx.arc(cx,cy+8,rage?20:14,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // 驾驶舱
    drawPoly([[cx,cy-33],[cx-12,cy-18],[cx-10,cy-4],[cx+10,cy-4],[cx+12,cy-18]],[180,120,0],YELLOW);
    // 旋转装饰
    for(let i=0;i<6;i++){
      const a=(t*3+i*60)*Math.PI/180;
      const rx=cx+Math.cos(a)*28, ry=cy+Math.sin(a)*16;
      ctx.fillStyle=rgba(GOLD,0.7); ctx.beginPath(); ctx.arc(rx,ry,4,0,Math.PI*2); ctx.fill();
    }
    // 狂暴光环
    if(rage){
      ctx.save(); ctx.globalAlpha=0.2+0.15*Math.sin(t*0.2);
      ctx.strokeStyle='rgb(255,50,50)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(cx,cy,70+Math.sin(t*0.1)*10,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    // Boss血条
    drawBar(W/2-130,10,260,12,this.hp/this.maxHp,rage?RED:GOLD);
    ctx.fillStyle='rgb(255,255,255)'; ctx.font='bold 14px Arial';
    ctx.textAlign='center';
    ctx.fillText(`BOSS  ${this.hp}/${this.maxHp}`,W/2,38);
    ctx.textAlign='left';
    if(rage&&(t/15|0)%2===0){
      ctx.fillStyle='rgb(255,60,60)'; ctx.font='bold 14px Arial';
      ctx.textAlign='center'; ctx.fillText('★ 狂暴！★',W/2,56); ctx.textAlign='left';
    }
    this.drawBullets();
  }
}

// ═══════════════════════════════════════════
//  生成敌机
// ═══════════════════════════════════════════
const ENEMY_TYPES=[EnemyFighter,EnemyZigzag,EnemyBomber,EnemyFast];
function spawnEnemy(){
  const pool=[];
  if(level>=1) pool.push(EnemyFighter,EnemyFighter,EnemyFighter);
  if(level>=2) pool.push(EnemyZigzag,EnemyZigzag);
  if(level>=3) pool.push(EnemyBomber);
  if(level>=4) pool.push(EnemyFast,EnemyFast);
  const Cls=pool[Math.random()*pool.length|0];
  enemies.push(new Cls(50+Math.random()*(W-100),  -30, level));
}

// 每关需要击杀数量
function killsNeeded(){ return 10+level*5; }

// ═══════════════════════════════════════════
//  碰撞检测
// ═══════════════════════════════════════════
function checkCollisions(){
  const pr=player.getRect();
  // 玩家子弹 vs 敌机
  for(let pb of bulletsPlayer){
    if(!pb.alive) continue;
    for(let en of enemies){
      if(!en.alive) continue;
      if(rectHit(pb.getRect(),en.getRect())){
        pb.alive=false; en.hp-=pb.damage;
        boom(pb.x,pb.y,en.color,8,3,3);
        if(en.hp<=0){
          en.alive=false; player.score+=en.scoreValue;
          boom(en.x,en.y,en.color,28,5,4); playBoom();
          killCount++;
          if(Math.random()<0.18&&player.power<3){ player.power++; playPowerup(); }
        }
        break;
      }
    }
    if(!pb.alive) continue;
    if(boss&&boss.alive&&rectHit(pb.getRect(),boss.getRect())){
      pb.alive=false; boss.hp-=pb.damage;
      boom(pb.x,pb.y,GOLD,6,3,2);
      if(boss.hp<=0){
        boss.alive=false; player.score+=boss.scoreValue;
        boom(boss.x,boss.y,GOLD,80,7,6); playBoom(true);
      }
    }
  }
  // 敌方子弹 vs 玩家
  for(let eb of bulletsEnemy){
    if(!eb.alive) continue;
    if(rectHit(pr,eb.getRect())){
      eb.alive=false;
      if(player.takeDamage(eb.damage)){
        boom(player.x,player.y,CYAN,14,4,3);
        if(player.hp<=0) handlePlayerDeath();
      }
    }
  }
  // 敌机碰撞玩家
  for(let en of enemies){
    if(!en.alive) continue;
    if(rectHit(pr,en.getRect())){
      en.alive=false; boom(en.x,en.y,en.color,20,4,4); playBoom();
      if(player.takeDamage(35)){
        boom(player.x,player.y,CYAN,14,4,3);
        if(player.hp<=0) handlePlayerDeath();
      }
    }
  }
}

function handlePlayerDeath(){
  player.lives--;
  if(player.lives<=0){
    boom(player.x,player.y,BLUE,50,6,6); playBoom(true);
    setTimeout(()=>endGame(false),600);
  } else {
    player.hp=player.maxHp; player.power=Math.max(1,player.power-1);
    player.invincible=150;
  }
}

// ═══════════════════════════════════════════
//  更新
// ═══════════════════════════════════════════
function update(){
  if(gameState!=='playing') return;
  player.handleInput(); player.update();

  // 更新敌机
  for(let e of enemies){
    e.update();
    bulletsEnemy.push(...e.bullets); e.bullets=[];
  }
  enemies=enemies.filter(e=>e.alive);

  // 更新Boss
  if(boss&&boss.alive){
    boss.update();
    bulletsEnemy.push(...boss.bullets); boss.bullets=[];
  } else if(boss&&!boss.alive){
    boss=null;
    if(level<totalLevels){
      level++; killCount=0; bossSpawned=false; spawnTimer=0;
      enemies=[]; bulletsEnemy=[];
    } else {
      setTimeout(()=>endGame(true),800);
    }
  }

  bulletsEnemy.forEach(b=>b.update());
  bulletsEnemy=bulletsEnemy.filter(b=>b.alive);
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>p.alive);

  // 生成敌机
  if(!bossSpawned){
    spawnTimer++;
    const interval=Math.max(28,80-level*10);
    if(spawnTimer>=interval){ spawnTimer=0; if(enemies.length<10) spawnEnemy(); }
    // 击杀足够多且场上无敌机 → 生成Boss
    if(killCount>=killsNeeded()&&enemies.length===0){
      bossSpawned=true; boss=new Boss(level);
    }
  }

  checkCollisions();
}

// ═══════════════════════════════════════════
//  绘制
// ═══════════════════════════════════════════
function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawStars();
  particles.forEach(p=>p.draw());
  enemies.forEach(e=>e.draw());
  if(boss&&boss.alive) boss.draw();
  bulletsEnemy.forEach(b=>b.draw());
  if(player){ bulletsPlayer.forEach(b=>b.draw()); player.draw(); }

  // HUD
  ctx.fillStyle='#fff'; ctx.font='bold 17px Arial';
  ctx.fillText(`得分: ${player.score}`,10,24);
  ctx.fillText(`关卡: ${level}/${totalLevels}`,10,46);
  ctx.fillText(`★`.repeat(player.lives),W-90,24);
  ctx.font='13px Arial'; ctx.fillStyle='#aaa';
  ctx.fillText(`武器Lv.${player.power}`,W-72,46);
  ctx.fillText(`击杀: ${killCount}/${killsNeeded()}`,W/2-30,24);
  drawBar(10,56,130,9,player.hp/player.maxHp,GREEN);

  // Boss预告
  if(bossSpawned&&boss&&!boss.entryDone&&(player.t/20|0)%2===0){
    ctx.fillStyle='rgb(255,50,50)'; ctx.font='bold 22px Arial'; ctx.textAlign='center';
    ctx.fillText('⚠ BOSS来袭 ⚠',W/2,H/2-60); ctx.textAlign='left';
  }
}

// ═══════════════════════════════════════════
//  游戏循环
// ═══════════════════════════════════════════
function gameLoop(now=performance.now()){
  if(gameState!=='playing') return;
  if(now-lastTime>=FRAME_MS){
    update(); draw();
    lastTime=now;
  }
  animId=requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  开始 / 结束
// ═══════════════════════════════════════════
function startGame(){
  initAudio();
  gameState='playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  level=1; killCount=0; spawnTimer=0; bossSpawned=false; boss=null;
  player=new Player(); enemies=[]; particles=[]; bulletsPlayer=[]; bulletsEnemy=[];
  initStars();
  if(animId) cancelAnimationFrame(animId);
  lastTime=performance.now();
  gameLoop();
}

function endGame(victory=false){
  if(gameState!=='playing') return;
  gameState='gameover';
  if(animId) cancelAnimationFrame(animId);
  document.getElementById('gameOverTitle').textContent=victory?'🏆 恭喜通关！':'💥 游戏结束';
  document.getElementById('finalScore').textContent=player.score;
  document.getElementById('finalLevel').textContent=level;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

// ═══════════════════════════════════════════
//  按钮 & 触摸绑定（DOM加载后）
// ═══════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click',  startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// 鼠标控制
canvas.addEventListener('mousemove', e=>{
  if(gameState!=='playing'||!player) return;
  const r=canvas.getBoundingClientRect();
  player.x=Math.max(22,Math.min(W-22,(e.clientX-r.left)*(W/r.width)));
  player.y=Math.max(28,Math.min(H-28,(e.clientY-r.top)*(H/r.height)));
});
canvas.addEventListener('mousedown', ()=>{ initAudio(); if(player) player.firing=true; });
canvas.addEventListener('mouseup',   ()=>{ if(player) player.firing=false; });

// 触摸摇杆
let joyActive=false, joyCenter={x:0,y:0};
const joyBtn=document.getElementById('joyBtn');
const fireBtn=document.getElementById('fireBtn');

function joyStart(e){
  e.preventDefault(); initAudio(); joyActive=true;
  const r=joyBtn.getBoundingClientRect();
  joyCenter.x=r.left+r.width/2; joyCenter.y=r.top+r.height/2;
}
function joyMove(e){
  if(!joyActive) return; e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const dx=cx-joyCenter.x, dy=cy-joyCenter.y;
  touchLeft=dx<-10; touchRight=dx>10; touchUp=dy<-10; touchDown=dy>10;
}
function joyEnd(){ joyActive=false; touchLeft=touchRight=touchUp=touchDown=false; }

joyBtn.addEventListener('touchstart',joyStart,{passive:false});
joyBtn.addEventListener('touchmove', joyMove, {passive:false});
joyBtn.addEventListener('touchend',  joyEnd);
fireBtn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();touchFire=true;},{passive:false});
fireBtn.addEventListener('touchend',  ()=>touchFire=false);

// 初始画面
initStars();
ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
drawStars();
</script>
