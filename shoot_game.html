    window.addEventListener('load', function() {

        wechatTip.innerHTML = '<div style="text-align:center;max-width:400px;">
          <h2 style="color:#50d0ff;margin-bottom:20px;font-size:1.5em;text-shadow:0 0 10px #50d0ff;">⚠️ 微信浏览器限制</h2>
          <p style="margin:10px 0;font-size:1.1em;line-height:1.6;">由于微信对本地HTML文件有安全限制，无法直接运行游戏。</p>

          <div style="margin-top:30px;padding:15px;background:rgba(80,208,255,0.1);border-radius:8px;border:1px solid #50d0ff;">

          </div>

        </div>';
        document.body.appendChild(wechatTip);
        document.getElementById('closeTip').addEventListener('click', function() {
          wechatTip.style.display = 'none';
        });
      }, 100);
    });
  }
})();
</script>

@media (min-width: 500px) {#touchControls {display:none;} #container {width:auto; height:auto;} #gameCanvas {width:auto; height:auto;}}

<body>
<div id="container">
<canvas id="gameCanvas" width="393" height="851"></canvas>
<div id="uiOverlay">
  <div id="startScreen" class="screen">
    <h1>★ 云舟星际战舰 ★</h1>

</div>

<script>
let canvas, ctx;
let W, H;

// 适配手机屏幕：设置合适的分辨率
function resizeCanvas() {
  if (window.innerWidth < 500 && canvas) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
  }
}

// DOM加载完成后初始化
function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  W = canvas.width;
  H = canvas.height;
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

// 颜色定义
const BLACK   = [0,   0,   0];
const WHITE   = [255, 255, 255];
const RED     = [255, 50,  50];
const GREEN   = [50,  255, 100];
const BLUE    = [50,  150, 255];
const YELLOW  = [255, 220, 50];
const CYAN    = [50,  240, 240];
const ORANGE  = [255, 140, 30];
const PURPLE  = [180, 60,  255];
const GRAY    = [120, 120, 120];
const DKRED   = [180, 0,   0];
const DKBLUE  = [0,   0,   120];
const PINK    = [255, 100, 180];
const GOLD    = [255, 200, 0];
const LIME    = [150, 255, 0];

// 游戏状态
let gameState = 'start'; // start, playing, gameover
let player = null;
let enemies = [];
let particles = [];
let stars = [];
let bulletsPlayer = [];
let bulletsEnemy = [];
let level = 1;
let totalLevels = 5;
let spawnTimer = 0;
let bossSpawned = false;
let boss = null;
let animationId = null;
let lastTime = 0;
const FPS = 60;
const dt = 1000 / FPS;

// 触摸控制
let touchLeft = false;
let touchRight = false;
let touchUp = false;
let touchDown = false;
let touchFire = false;

// 音频上下文
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playShootSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.1);
}

function playExplosionSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.3);
}

function playHitSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.2);
}

// 粒子类
class Particle {
  constructor(x, y, color, speed = 3, life = 30, size = 3) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size;
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.4 + Math.random() * 0.6);
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.05;
    this.life--;
  }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    const r = Math.max(1, this.size * alpha);
    ctx.fillStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  get alive() {return this.life > 0;}
}

function spawnExplosion(x, y, color, count = 20, speed = 4, size = 4) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color, speed, Math.floor(20 + Math.random() * 20), size));
  }
}

// 子弹类
class Bullet {
  constructor(x, y, vy, color, damage, size, vx = 0) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.damage = damage;
    this.size = size;
    this.alive = true;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -20 || this.y > H + 20 || this.x < -20 || this.x > W + 20) {
      this.alive = false;
    }
  }
  draw(ctx) {
    ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    // 光晕
    ctx.fillStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0.4)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  getRect() {
    return {
      x: this.x - this.size,
      y: this.y - this.size,
      w: this.size * 2,
      h: this.size * 2
    };
  }
}

// 玩家类
class Player {
  constructor() {
    this.W = 40;
    this.H = 50;
    this.x = W / 2;
    this.y = H - 80;
    this.hp = 100;
    this.maxHp = 100;
    this.speed = 5;
    this.shootCd = 0;
    this.shootDelay = 8;
    this.invincible = 0;
    this.power = 1;
    this.score = 0;
    this.lives = 3;
    this.flameT = 0;
    this.firing = false;
  }
  handleInput() {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || touchLeft) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || touchRight) dx += 1;
    if (keys['ArrowUp'] || keys['w'] || touchUp) dy -= 1;
    if (keys['ArrowDown'] || keys['s'] || touchDown) dy += 1;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len > 0) {
      dx = dx / len * this.speed;
      dy = dy / len * this.speed;
      this.x += dx;
      this.y += dy;
    }
    this.x = Math.max(this.W/2, Math.min(W - this.W/2, this.x));
    this.y = Math.max(this.H/2, Math.min(H - this.H/2, this.y));
    if (keys[' '] || keys['j'] || touchFire || this.firing) {
      this.tryShoot();
    }
  }
  tryShoot() {
    if (this.shootCd <= 0) {
      if (this.power === 1) {
        bulletsPlayer.push(new Bullet(this.x, this.y - 20, -13, YELLOW, 10, 4));
      } else if (this.power === 2) {
        bulletsPlayer.push(new Bullet(this.x - 12, this.y - 15, -13, CYAN, 12, 4));
        bulletsPlayer.push(new Bullet(this.x + 12, this.y - 15, -13, CYAN, 12, 4));
      } else {
        bulletsPlayer.push(new Bullet(this.x, this.y - 20, -14, WHITE, 15, 5));
        bulletsPlayer.push(new Bullet(this.x - 16, this.y - 12, -13, CYAN, 12, 4, -0.5));
        bulletsPlayer.push(new Bullet(this.x + 16, this.y - 12, -13, CYAN, 12, 4, 0.5));
      }
      playShootSound();
      this.shootCd = this.shootDelay;
    }
  }
  update() {
    this.shootCd = Math.max(0, this.shootCd - 1);
    this.invincible = Math.max(0, this.invincible - 1);
    this.flameT++;
    for (let b of bulletsPlayer) {
      b.update();
    }
    bulletsPlayer = bulletsPlayer.filter(b => b.alive);
  }
  takeDamage(dmg) {
    if (this.invincible > 0) return false;
    this.hp -= dmg;
    this.invincible = 90;
    playHitSound();
    return true;
  }
  getRect() {
    return {x: this.x - 15, y: this.y - 18, w: 30, h: 36};
  }
  draw(ctx) {
    const cx = Math.floor(this.x);
    const cy = Math.floor(this.y);
    const t = this.flameT;

    // 引擎尾焰
    for (let ex of [cx - 9, cx + 9]) {
      const layers = [
        [RED, 5, 18],
        [ORANGE, 4, 14],
        [YELLOW, 3, 10],
        [WHITE, 2, 6]
      ];
      for (let layer = 0; layer < layers.length; layer++) {
        const [fc, fw, fh_base] = layers[layer];
        const fh2 = fh_base + Math.floor(Math.sin(t * 0.6 + layer + ex) * 4);
        ctx.save();
        ctx.globalAlpha = (200 - layer * 30) / 255;
        ctx.fillStyle = `rgb(${fc[0]}, ${fc[1]}, ${fc[2]})`;
        ctx.beginPath();
        ctx.ellipse(ex - fw, cy + 20, fw, fh2 / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // 尾翼小翼片
    drawTriangle(ctx, [
      [cx - 6, cy + 18], [cx - 14, cy + 26], [cx - 6, cy + 26]
    ], [20, 60, 160], [80, 180, 255]);
    drawTriangle(ctx, [
      [cx + 6, cy + 18], [cx + 14, cy + 26], [cx + 6, cy + 26]
    ], [20, 60, 160], [80, 180, 255]);

    // 主机翼
    drawPolygon(ctx, [
      [cx - 10, cy + 2],
      [cx - 38, cy + 22],
      [cx - 30, cy + 28],
      [cx - 8,  cy + 18],
    ], [15, 55, 150], [60, 160, 255]);
    drawPolygon(ctx, [
      [cx + 10, cy + 2],
      [cx + 38, cy + 22],
      [cx + 30, cy + 28],
      [cx + 8,  cy + 18],
    ], [15, 55, 150], [60, 160, 255]);
    // 翼面高光
    ctx.strokeStyle = `rgb(80, 200, 255)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 12, cy + 6);
    ctx.lineTo(cx - 32, cy + 20);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 12, cy + 6);
    ctx.lineTo(cx + 32, cy + 20);
    ctx.stroke();

    // 机身主体
    drawPolygon(ctx, [
      [cx,      cy - 28],
      [cx - 4,  cy - 18],
      [cx - 7,  cy - 4],
      [cx - 9,  cy + 10],
      [cx - 8,  cy + 20],
      [cx,      cy + 14],
      [cx + 8,  cy + 20],
      [cx + 9,  cy + 10],
      [cx + 7,  cy - 4],
      [cx + 4,  cy - 18],
    ], [18, 80, 180], [100, 200, 255]);

    // 机身中轴高光
    ctx.strokeStyle = `rgb(150, 220, 255)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 26);
    ctx.lineTo(cx, cy + 12);
    ctx.stroke();

    // 侧面进气口
    for (let sx of [cx - 8, cx + 5]) {
      ctx.fillStyle = `rgb(10, 30, 100)`;
      ctx.fillRect(sx, cy - 2, 7, 10);
      ctx.strokeStyle = `rgb(80, 160, 255)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, cy - 2, 7, 10);
    }

    // 驾驶舱
    drawPolygon(ctx, [
      [cx,      cy - 26],
      [cx - 5,  cy - 16],
      [cx - 4,  cy - 6],
      [cx + 4,  cy - 6],
      [cx + 5,  cy - 16],
    ], [30, 120, 200], CYAN);
    // 玻璃高光
    ctx.strokeStyle = `rgb(180, 240, 255)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 1, cy - 24);
    ctx.lineTo(cx - 3, cy - 10);
    ctx.stroke();

    // 机翼挂载武器
    for (let [mx, my] of [[cx - 26, cy + 12], [cx + 22, cy + 12]]) {
      ctx.fillStyle = `rgb(60, 60, 80)`;
      ctx.beginPath();
      ctx.ellipse(mx, my, 3, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `rgb(120, 120, 160)`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.strokeStyle = `rgb(${ORANGE[0]}, ${ORANGE[1]}, ${ORANGE[2]})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(mx, my + 7);
      ctx.lineTo(mx, my + 11);
      ctx.stroke();
    }

    // 武器等级光效
    if (this.power >= 2) {
      const alpha = 0.25 + 0.15 * Math.sin(t * 0.2);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `rgba(0, 200, 255, ${alpha})`;
      for (let gx of [cx - 14, cx + 10]) {
        ctx.beginPath();
        ctx.arc(gx - 4 + 10, cy - 4 + 10, 10, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // 无敌护盾
    if (this.invincible > 0 && (Math.floor(this.invincible / 5) % 2) === 0) {
      ctx.save();
      const alpha = 0.3 * this.invincible / 90;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
      ctx.lineWidth = 2;
      for (let rOff = 0; rOff < 3; rOff++) {
        ctx.beginPath();
        ctx.ellipse(cx, cy, 36 - rOff * 2, 40 - rOff * 2, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// 辅助绘图函数
function drawTriangle(ctx, points, fill, stroke) {
  ctx.fillStyle = `rgb(${fill[0]}, ${fill[1]}, ${fill[2]})`;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0], points[i][1]);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = `rgb(${stroke[0]}, ${stroke[1]}, ${stroke[2]})`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawPolygon(ctx, points, fill, stroke) {
  ctx.fillStyle = `rgb(${fill[0]}, ${fill[1]}, ${fill[2]})`;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0], points[i][1]);
  }
  ctx.closePath();
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = `rgb(${stroke[0]}, ${stroke[1]}, ${stroke[2]})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawBar(ctx, x, y, w, h, ratio, fg) {
  ctx.fillStyle = `rgb(${GRAY[0]}, ${GRAY[1]}, ${GRAY[2]})`;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = `rgb(${fg[0]}, ${fg[1]}, ${fg[2]})`;
  ctx.fillRect(x, y, Math.floor(w * Math.max(0, ratio)), h);
  ctx.strokeStyle = `rgb(${WHITE[0]}, ${WHITE[1]}, ${WHITE[2]})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

function rectIntersect(r1, r2) {
  return !(r1.x + r1.w < r2.x || r1.x > r2.x + r2.w ||
           r1.y + r1.h < r2.y || r1.y > r2.y + r2.h);
}

// 敌机基类
class Enemy {
  constructor(x, y, hp, speed, scoreValue, color) {
    this.x = x;
    this.y = y;
    this.hp = hp;
    this.maxHp = hp;
    this.speed = speed;
    this.scoreValue = scoreValue;
    this.color = color;
    this.alive = true;
    this.bullets = [];
    this.t = 0;
    this.shootCd = 30;
  }
  updateBullets() {
    for (let b of this.bullets) {
      b.update();
    }
    this.bullets = this.bullets.filter(b => b.alive);
  }
  drawHpBar(ctx) {
    const ratio = this.hp / this.maxHp;
    if (ratio < 1) {
      const w = 40;
      const h = 4;
      drawBar(ctx, this.x - w/2, this.y - 30, w, h, ratio, RED);
    }
  }

class Boss extends Enemy {
  constructor(level = 5) {
    const hp = 500 + level * 100;
    const speed = 0.8;
    const score = 5000;
    super(W / 2, -100, hp, speed, score, GOLD);
    this.size = 80;
    this.phase = 0;
    this.attackPattern = 0;
    this.patternTimer = 0;
    this.direction = 1;
  }
  getRect() {
    return {x: this.x - 50, y: this.y - 40, w: 100, h: 100};
  }
  update() {
    this.t++;
    this.patternTimer++;

    // 进入位置
    if (this.y < 80) {
      this.y += this.speed;
    } else {
      // 左右移动
      this.x += this.direction * 1.2;
      if (this.x < 100) this.direction = 1;
      if (this.x > W - 100) this.direction = -1;
    }

    // 攻击模式
    if (this.y >= 80) {
      if (this.patternTimer >= 120) {
        this.patternTimer = 0;
        this.attackPattern = (this.attackPattern + 1) % 3;
      }

      if (this.attackPattern === 0) {
        // 环形散射
        if (this.t % 20 === 0) {
          for (let i = 0; i < 12; i++) {
            const angle = (this.t * 2 + i * 30) * Math.PI / 180;
            const vx = Math.cos(angle) * 4;
            const vy = Math.sin(angle) * 4 + 3;
            this.bullets.push(new Bullet(this.x, this.y + 40, vy, GOLD, 20, 6, vx));
          }
        }
      } else if (this.attackPattern === 1) {
        // 双侧向弹幕
        if (this.t % 10 === 0) {
          for (let side of [-1, 1]) {
            const ex = this.x + side * 35;
            for (let i = 0; i < 3; i++) {
              this.bullets.push(new Bullet(ex, this.y + 30 + i * 15, 5 + i * 0.5, ORANGE, 18, 5));
            }
          }
        }
      } else if (this.attackPattern === 2) {
        // 螺旋弹幕
        if (this.t % 8 === 0) {
          const baseAngle = this.t * 3;
          for (let i = 0; i < 4; i++) {
            const angle = (baseAngle + i * 90) * Math.PI / 180;
            const vx = Math.cos(angle) * 3.5;
            const vy = Math.sin(angle) * 3.5 + 2.5;
            this.bullets.push(new Bullet(this.x, this.y + 30, vy, PURPLE, 25, 7, vx));
          }
        }
      }
    }

    this.updateBullets();
    if (this.y > H + 100) this.alive = false;
  }
  draw(ctx) {
    const cx = Math.floor(this.x);
    const cy = Math.floor(this.y);
    const t = this.t;

    // Boss主体绘制
    // 主翼
    drawPolygon(ctx, [
      [cx - 70, cy + 20],
      [cx - 40, cy - 20],
      [cx + 40, cy - 20],
      [cx + 70, cy + 20],
      [cx + 30, cy + 40],
      [cx - 30, cy + 40],
    ], [80, 60, 0], GOLD);

    // 机身
    drawPolygon(ctx, [
      [cx - 15, cy - 30],
      [cx - 20, cy + 20],
      [cx - 10, cy + 40],
      [cx + 10, cy + 40],
      [cx + 20, cy + 20],
      [cx + 15, cy - 30],
    ], [120, 80, 20], GOLD);

    // 核心能量
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t * 0.1);
    ctx.fillStyle = `rgba(${GOLD[0]}, ${GOLD[1]}, ${GOLD[2]}, ${0.5 + 0.3 * Math.sin(t * 0.1)})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 血条
    const ratio = this.hp / this.maxHp;
    drawBar(ctx, W / 2 - 150, 20, 300, 10, ratio, GOLD);

    // 绘制子弹
    this.drawBullets(ctx);
  }
}

  // 绑定触摸摇杆事件
  function handleJoyStart(e) {
    e.preventDefault();
    initAudio();
    const rect = joyBtn.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    joyActive = true;
    joyCenter.x = rect.left + rect.width / 2;
    joyCenter.y = rect.top + rect.height / 2;
    joyCurrent.x = clientX;
    joyCurrent.y = clientY;
  }

  function handleJoyMove(e) {
    if (!joyActive) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    joyCurrent.x = clientX;
    joyCurrent.y = clientY;
    
    // 根据摇杆位置更新方向
    const dx = joyCurrent.x - joyCenter.x;
    const dy = joyCurrent.y - joyCenter.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    touchLeft = dx < -10;
    touchRight = dx > 10;
    touchUp = dy < -10;
    touchDown = dy > 10;
  }

  function handleJoyEnd(e) {
    joyActive = false;
    touchLeft = false;
    touchRight = false;
    touchUp = false;
    touchDown = false;
  }

  // 绑定摇杆触摸事件
  joyBtn.addEventListener('touchstart', handleJoyStart);
  joyBtn.addEventListener('touchmove', handleJoyMove);
  joyBtn.addEventListener('touchend', handleJoyEnd);
  joyBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    initAudio();
    handleJoyStart(e);
  });
  document.addEventListener('mousemove', (e) => {
    if (joyActive) handleJoyMove(e);
  });
  document.addEventListener('mouseup', handleJoyEnd);

  // 绑定开火按钮事件
  addTouchEvents(fireBtn, () => {
    touchFire = true;
  }, () => {
    touchFire = false;
  });

  // 鼠标跟随
  canvas.addEventListener('mousemove', e => {
    if (gameState !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    if (player) {
      player.x = x;
      player.y = y;
      player.x = Math.max(player.W/2, Math.min(W - player.W/2, player.x));
      player.y = Math.max(player.H/2, Math.min(H - player.H/2, player.y));
    }
  });

  // 鼠标点击开火
  canvas.addEventListener('mousedown', () => {
    if (gameState === 'playing' && player) {
      initAudio();
      player.firing = true;
    }
  });
  canvas.addEventListener('mouseup', () => {
    if (player) player.firing = false;
  });
});

// 开始游戏
function startGame() {
  initAudio();
  gameState = 'playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  
  level = 1;
  spawnTimer = 0;
  bossSpawned = false;
  boss = null;
  player = new Player();
  enemies = [];
  particles = [];
  bulletsPlayer = [];
  bulletsEnemy = [];
  initStars();
  
  if (animationId) {
    cancelAnimationFrame(animationId);
  }
  lastTime = performance.now();
  gameLoop();
}

// 游戏结束
function gameOver(victory = false) {
  gameState = 'gameover';
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = player.score;
  document.getElementById('finalLevel').textContent = level;
  if (victory) {
    document.getElementById('gameOverTitle').textContent = '恭喜通关！';
  } else {
    document.getElementById('gameOverTitle').textContent = '游戏结束';
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
  }
}

// 生成敌机
function spawnEnemy() {
  const types = [];
  if (level >= 1) types.push(EnemyFighter);
  if (level >= 2) types.push(EnemyZigzag);
  if (level >= 3) types.push(EnemyFast);
  if (level >= 4) types.push(EnemyBomber);
  
  if (types.length === 0) return;
  
  const EnemyClass = types[Math.floor(Math.random() * types.length)];
  const x = 50 + Math.random() * (W - 100);
  const enemy = new EnemyClass(x, -30, level);
  enemies.push(enemy);
}

// 碰撞检测
function checkCollisions() {
  // 玩家子弹 vs 敌机
  for (let pb of bulletsPlayer) {
    for (let enemy of enemies) {
      if (!enemy.alive) continue;
      const pbRect = pb.getRect();
      const enRect = enemy.getRect();
      if (rectIntersect(pbRect, enRect)) {
        pb.alive = false;
        enemy.hp -= pb.damage;
        if (enemy.hp <= 0) {
          enemy.alive = false;
          player.score += enemy.scoreValue;
          spawnExplosion(enemy.x, enemy.y, enemy.color, 30, 5, 5);
          playExplosionSound();
          // 概率升级武器
          if (Math.random() < 0.15 && player.power < 3) {
            player.power++;
          }
        }
      }
    }
    // 玩家子弹 vs Boss
    if (boss && boss.alive) {
      const pbRect = pb.getRect();
      const br = boss.getRect();
      if (rectIntersect(pbRect, br)) {
        pb.alive = false;
        boss.hp -= pb.damage;
        if (boss.hp <= 0) {
          boss.alive = false;
          player.score += boss.scoreValue;
          spawnExplosion(boss.x, boss.y, GOLD, 80, 6, 6);
          playExplosionSound();
          setTimeout(() => {
            gameOver(true);
          }, 1000);
        }
      }
    }
  }
  
  // 敌方子弹 vs 玩家
  const pr = player.getRect();
  for (let eb of bulletsEnemy) {
    const er = eb.getRect();
    if (rectIntersect(pr, er)) {
      eb.alive = false;
      if (player.takeDamage(eb.damage)) {
        if (player.hp <= 0) {
          player.lives--;
          if (player.lives <= 0) {
            spawnExplosion(player.x, player.y, BLUE, 50, 5, 6);
            playExplosionSound();
            setTimeout(() => {
              gameOver(false);
            }, 500);
          } else {
            player.hp = player.maxHp;
            player.power = Math.max(1, player.power - 1);
          }
        }
      }
    }
  }
  
  // 敌机碰撞 vs 玩家
  for (let enemy of enemies) {
    if (!enemy.alive) continue;
    const er = enemy.getRect();
    if (rectIntersect(pr, er)) {
      enemy.alive = false;
      spawnExplosion(enemy.x, enemy.y, enemy.color, 20, 4, 4);
      playExplosionSound();
      if (player.takeDamage(30)) {
        if (player.hp <= 0) {
          player.lives--;
          if (player.lives <= 0) {
            spawnExplosion(player.x, player.y, BLUE, 50, 5, 6);
            playExplosionSound();
            setTimeout(() => {
              gameOver(false);
            }, 500);
          } else {
            player.hp = player.maxHp;
            player.power = Math.max(1, player.power - 1);
          }
        }
      }
    }
  }
}

// 更新游戏
function update() {
  if (gameState !== 'playing') return;
  
  player.handleInput();
  player.update();
  
  // 更新敌机
  for (let e of enemies) {
    e.update();
    for (let b of e.bullets) {
      bulletsEnemy.push(b);
    }
    e.bullets = [];
  }
  enemies = enemies.filter(e => e.alive);
  
  // 更新Boss
  if (boss && boss.alive) {
    boss.update();
    for (let b of boss.bullets) {
      bulletsEnemy.push(b);
    }
    boss.bullets = [];
  } else if (boss && !boss.alive) {
    boss = null;
    if (level < totalLevels) {
      level++;
      bossSpawned = false;
    }
  }
  
  // 更新敌方子弹
  for (let b of bulletsEnemy) {
    b.update();
  }
  bulletsEnemy = bulletsEnemy.filter(b => b.alive);
  
  // 更新粒子
  for (let p of particles) {
    p.update();
  }
  particles = particles.filter(p => p.alive);
  
  // 生成敌机
  if (!bossSpawned) {
    spawnTimer++;
    const spawnInterval = Math.max(30, 80 - level * 10);
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      if (level < totalLevels) {
        if (enemies.length < 8) {
          spawnEnemy();
        }
      } else {
        if (!bossSpawned && enemies.length === 0) {
          bossSpawned = true;
          boss = new Boss(level);
        }
      }
    }
  }
  
  // 检查碰撞
  checkCollisions();
}

// 绘制游戏
function draw() {
  // 清空画布
  ctx.fillStyle = 'rgb(0, 0, 0)';
  ctx.fillRect(0, 0, W, H);
  
  // 绘制星空
  drawStars(ctx);
  
  // 绘制粒子
  for (let p of particles) {
    p.draw(ctx);
  }
  
  // 绘制敌机
  for (let e of enemies) {
    e.draw(ctx);
  }
  
  // 绘制Boss
  if (boss && boss.alive) {
    boss.draw(ctx);
  }
  
  // 绘制敌方子弹
  for (let b of bulletsEnemy) {
    b.draw(ctx);
  }
  
  // 绘制玩家
  if (player) {
    for (let b of bulletsPlayer) {
      b.draw(ctx);
    }
    player.draw(ctx);
  }
  
  // UI信息
  ctx.fillStyle = 'rgb(255, 255, 255)';
  ctx.font = 'bold 18px Arial';
  ctx.fillText(`得分: ${player.score}`, 10, 25);
  ctx.fillText(`关卡: ${level}/${totalLevels}`, 10, 50);
  ctx.fillText(`生命: ${player.lives}`, W - 80, 25);
  
  // 血条
  drawBar(ctx, 10, 65, 120, 8, player.hp / player.maxHp, RED);
}

// 游戏主循环
function gameLoop(currentTime = performance.now()) {
  if (gameState !== 'playing') return;
  
  const delta = currentTime - lastTime;
  if (delta >= dt) {
    update();
    draw();
    lastTime = currentTime - (delta % dt);
  }
  
  animationId = requestAnimationFrame(gameLoop);
}

// 初始绘制
initStars();
ctx.fillStyle = 'rgb(0, 0, 0)';
ctx.fillRect(0, 0, W, H);
drawStars(ctx);
